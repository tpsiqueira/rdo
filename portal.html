<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rio das Ostras- Portal de Dados</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            text-align: center;
        }

        h1 {
            color: #fff;
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .subtitle {
            color: rgba(255,255,255,0.8);
            font-size: 1.1rem;
            margin-bottom: 50px;
        }

        .cards {
            display: flex;
            gap: 30px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .card {
            background: #fff;
            border-radius: 16px;
            padding: 40px 50px;
            text-decoration: none;
            color: #333;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            min-width: 250px;
            width: 250px;
            text-align: center;
        }

        .card:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
        }

        .card-icon {
            font-size: 3rem;
            margin-bottom: 15px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card-title {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .card-desc {
            color: #666;
            font-size: 0.95rem;
        }

        .card.contratados {
            border-top: 4px solid #e74c3c;
        }

        .card.contratados .card-icon {
            color: #e74c3c;
        }

        .card.servidores {
            border-top: 4px solid #27ae60;
        }

        .card.servidores .card-icon {
            color: #27ae60;
        }

        .card.vanesca {
            border-top: 4px solid #c9a96e;
        }

        .card.vanesca .card-icon {
            color: #c9a96e;
        }

        .card-icon img {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #c9a96e;
        }

        /* RESPONSIVO - MOBILE */
        @media (max-width: 768px) {
            h1 {
                font-size: 1.8rem;
            }

            .subtitle {
                font-size: 0.95rem;
                margin-bottom: 30px;
            }

            .cards {
                flex-direction: column;
                gap: 20px;
                width: 100%;
            }

            .card {
                min-width: unset;
                width: 100%;
                padding: 30px 25px;
            }

            .card-icon {
                font-size: 2.5rem;
                height: 50px;
            }

            .card-icon img {
                width: 50px;
                height: 50px;
            }

            .card-title {
                font-size: 1.3rem;
            }

            .header-bar {
                padding: 8px 15px;
                flex-wrap: wrap;
                gap: 8px;
            }

            .user-info {
                font-size: 0.8rem;
            }

            .btn-logout {
                padding: 6px 12px;
                font-size: 0.8rem;
            }

            .container {
                width: 100%;
                padding: 0 10px;
            }
        }

        @media (max-width: 480px) {
            body {
                padding: 60px 10px 20px;
            }

            h1 {
                font-size: 1.5rem;
            }

            .card {
                padding: 25px 20px;
            }

            .card-title {
                font-size: 1.1rem;
            }

            .card-desc {
                font-size: 0.85rem;
            }
        }

        footer {
            margin-top: 50px;
            color: rgba(255,255,255,0.6);
            font-size: 0.9rem;
        }

        .header-bar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: rgba(0,0,0,0.2);
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .user-info {
            color: #fff;
            font-size: 0.9rem;
        }

        .btn-logout {
            background: rgba(255,255,255,0.2);
            color: #fff;
            border: 1px solid rgba(255,255,255,0.3);
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: background 0.3s ease;
        }

        .btn-logout:hover {
            background: rgba(255,255,255,0.3);
        }
    </style>
</head>
<body>
    <div class="header-bar">
        <span class="user-info">👤 Bem-vindo, <strong id="nomeUsuario"></strong></span>
        <button class="btn-logout" onclick="logout()">🚪 Sair</button>
    </div>

    <div class="container">
        <h1>📊 Portal Rio das Ostras</h1>
        <p class="subtitle">Sistema de Consulta de Dados</p>
        
        <div class="cards">
            <a href="contratados.html" class="card contratados">
                <div class="card-icon">📋</div>
                <div class="card-title">Contratados</div>
                <div class="card-desc">Consultar dados de contratados</div>
            </a>
            
            <a href="servidores.html" class="card servidores">
                <div class="card-icon">👥</div>
                <div class="card-title">Servidores</div>
                <div class="card-desc">Consultar dados de servidores</div>
            </a>
            
            <a href="vanesca.html" class="card vanesca">
                <div class="card-icon"><img src="fotos/face.jpg" alt="Vanesca"></div>
                <div class="card-title">Vanesca</div>
                <div class="card-desc">Álbum de Memórias</div>
            </a>
        </div>
    </div>
    
    <footer>
        Rio das Ostras - Relatório de Dados Organizacionais
    </footer>

    <script>
        // Verifica autenticação
        if (sessionStorage.getItem('autenticado') !== 'true') {
            window.location.href = 'index.html';
        }

        // Exibe nome do usuário
        document.getElementById('nomeUsuario').textContent = sessionStorage.getItem('usuario') || 'Usuário';

        function logout() {
            sessionStorage.removeItem('autenticado');
            sessionStorage.removeItem('usuario');
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
