<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Salários por Colaborador Contratados</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .table-container { max-height: calc(100vh - 280px); overflow: auto; }
        .sort-btn { cursor: pointer; user-select: none; display: inline-flex; align-items: center; gap: 2px; white-space: nowrap; }
        .sort-btn:hover { opacity: 0.8; }
        .sort-icon { font-size: 10px; opacity: 0.5; }
        .sort-icon.active { opacity: 1; }
        table { width: 100%; table-layout: fixed; }
        table tr { height: 50px; }
        table th, table td { 
            font-size: 11px; 
            padding: 4px 6px !important; 
            overflow: hidden;
            text-overflow: ellipsis;
            height: 50px;
            max-height: 50px;
            line-height: 1.3;
            vertical-align: middle;
        }
        table td { white-space: normal; word-wrap: break-word; }
        table th { white-space: nowrap; }
        table th:nth-child(1), table td:nth-child(1) { width: 30px; }
        table th:nth-child(2), table td:nth-child(2) { width: 70px; }
        table th:nth-child(3), table td:nth-child(3) { width: 70px; }
        table th:nth-child(4), table td:nth-child(4) { width: 120px; }
        table th:nth-child(5), table td:nth-child(5) { width: 120px; }
        table th:nth-child(6), table td:nth-child(6) { width: 80px; }
        table th:nth-child(7), table td:nth-child(7) { width: 70px; }
        table th:nth-child(8), table td:nth-child(8) { width: 70px; }
        table th:nth-child(9), table td:nth-child(9) { width: 60px; }
        table th:nth-child(10), table td:nth-child(10) { width: 70px; }
        table th:nth-child(11), table td:nth-child(11) { width: 70px; }
        table th:nth-child(12), table td:nth-child(12) { width: 70px; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen">
    <div class="container mx-auto px-4 py-8">
        <header class="mb-8 flex items-start justify-between">
            <div>
                <h1 class="text-3xl font-bold text-gray-800 mb-2">Salários por Colaborador Contratados</h1>
                <p class="text-gray-600">Visualização dos salários dos colaboradores contratados</p>
            </div>
            <a href="portal.html" class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition text-sm font-medium flex items-center gap-2">
                ← Voltar para Portal
            </a>
        </header>

        <div class="bg-white rounded-xl shadow-lg p-6 mb-6">
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-5 gap-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Mês/Ano</label>
                    <select id="filterMes" onchange="loadJSON()" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition text-sm">
                        <option value="01-2026">Janeiro/2026</option>
                        <option value="02-2026">Fevereiro/2026</option>
                        <option value="03-2026" selected>Março/2026</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Buscar</label>
                    <input type="text" id="searchInput" placeholder="Pesquisar..." 
                        class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition text-sm">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Tipo da Folha</label>
                    <select id="filterTipoFolha" onchange="filterData()" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition text-sm">
                        <option value="">Todos</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Vínculo</label>
                    <select id="filterVinculo" onchange="filterData()" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition text-sm">
                        <option value="">Todos</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Cargo</label>
                    <select id="filterCargo" onchange="filterData()" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition text-sm">
                        <option value="">Todos</option>
                    </select>
                </div>
            </div>
            <div class="mt-4 flex items-center gap-4">
                <span id="totalRecords" class="text-sm text-gray-600"></span>
                <button onclick="exportToJSON()" class="px-4 py-2 bg-green-600 text-white rounded-lg hover:bg-green-700 transition text-sm font-medium">
                    Exportar JSON
                </button>
            </div>
        </div>

        <div class="bg-white rounded-xl shadow-lg overflow-hidden">
            <div class="table-container overflow-auto">
                <table class="w-full">
                    <thead id="tableHead" class="bg-gray-800 text-white sticky top-0">
                    </thead>
                    <tbody id="tableBody" class="divide-y divide-gray-200">
                    </tbody>
                </table>
            </div>
        </div>

        <div id="loading" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
            <div class="bg-white rounded-xl p-8 text-center">
                <div class="animate-spin rounded-full h-12 w-12 border-4 border-blue-500 border-t-transparent mx-auto mb-4"></div>
                <p class="text-gray-700 font-medium">Carregando dados...</p>
            </div>
        </div>
    </div>

    <script>
        let pessoalData = [];
        let filteredData = [];
        let columns = [];
        let sortColumn = null;
        let sortDirection = 'asc';

        async function loadJSON() {
            const mes = document.getElementById('filterMes').value;
            document.getElementById('loading').style.display = 'flex';
            
            // Reset filtros
            document.getElementById('filterTipoFolha').innerHTML = '<option value="">Todos</option>';
            document.getElementById('filterVinculo').innerHTML = '<option value="">Todos</option>';
            document.getElementById('filterCargo').innerHTML = '<option value="">Todos</option>';
            document.getElementById('searchInput').value = '';
            
            try {
                const response = await fetch(`contratados_${mes}.json`);
                pessoalData = await response.json();
                
                if (pessoalData.length > 0) {
                    columns = Object.keys(pessoalData[0]);
                }

                renderTableHeader();
                populateFilters();
                filteredData = [...pessoalData];
                renderTable();
                document.getElementById('loading').style.display = 'none';
            } catch (error) {
                console.error('Erro ao carregar JSON:', error);
                document.getElementById('loading').innerHTML = `
                    <div class="bg-white rounded-xl p-8 text-center">
                        <p class="text-red-600 font-medium">Erro ao carregar arquivo JSON</p>
                        <p class="text-gray-500 text-sm mt-2">${error.message}</p>
                    </div>
                `;
            }
        }

        function renderTableHeader() {
            const thead = document.getElementById('tableHead');
            let headerHTML = '<tr><th class="px-4 py-3 text-left text-sm font-semibold">#</th>';
            
            columns.forEach(col => {
                const isActive = sortColumn === col;
                const icon = isActive ? (sortDirection === 'asc' ? '▲' : '▼') : '▲▼';
                const activeClass = isActive ? 'active' : '';
                headerHTML += `<th class="px-4 py-3 text-left text-sm font-semibold">
                    <span class="sort-btn" onclick="sortData('${col}')">
                        ${col}
                        <span class="sort-icon ${activeClass}">${icon}</span>
                    </span>
                </th>`;
            });
            
            headerHTML += '</tr>';
            thead.innerHTML = headerHTML;
        }

        function sortData(column) {
            if (sortColumn === column) {
                sortDirection = sortDirection === 'asc' ? 'desc' : 'asc';
            } else {
                sortColumn = column;
                sortDirection = 'asc';
            }

            filteredData.sort((a, b) => {
                let valA = a[column] || '';
                let valB = b[column] || '';
                
                // Tenta ordenar como número se for valor monetário
                if (valA.includes('R$')) {
                    valA = parseFloat(valA.replace(/[R$\s.]/g, '').replace(',', '.')) || 0;
                    valB = parseFloat(valB.replace(/[R$\s.]/g, '').replace(',', '.')) || 0;
                } else {
                    valA = String(valA).toLowerCase();
                    valB = String(valB).toLowerCase();
                }

                if (valA < valB) return sortDirection === 'asc' ? -1 : 1;
                if (valA > valB) return sortDirection === 'asc' ? 1 : -1;
                return 0;
            });

            renderTableHeader();
            renderTable();
        }

        function populateFilters() {
            const tipoFolhaSet = new Set();
            const vinculoSet = new Set();
            const cargoSet = new Set();

            pessoalData.forEach(row => {
                if (row['Tipo da Folha']) tipoFolhaSet.add(row['Tipo da Folha']);
                if (row['Vínculo Empregatício']) vinculoSet.add(row['Vínculo Empregatício']);
                if (row['Cargo']) cargoSet.add(row['Cargo']);
            });

            const tipoFolhaSelect = document.getElementById('filterTipoFolha');
            [...tipoFolhaSet].sort().forEach(val => {
                tipoFolhaSelect.innerHTML += `<option value="${val}">${val}</option>`;
            });

            const vinculoSelect = document.getElementById('filterVinculo');
            [...vinculoSet].sort().forEach(val => {
                vinculoSelect.innerHTML += `<option value="${val}">${val}</option>`;
            });

            const cargoSelect = document.getElementById('filterCargo');
            [...cargoSet].sort().forEach(val => {
                cargoSelect.innerHTML += `<option value="${val}">${val}</option>`;
            });
        }

        function filterData() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const tipoFolha = document.getElementById('filterTipoFolha').value;
            const vinculo = document.getElementById('filterVinculo').value;
            const cargo = document.getElementById('filterCargo').value;

            filteredData = pessoalData.filter(row => {
                const matchSearch = !searchTerm || columns.some(col => {
                    const value = String(row[col] || '').toLowerCase();
                    return value.includes(searchTerm);
                });
                const matchTipoFolha = !tipoFolha || row['Tipo da Folha'] === tipoFolha;
                const matchVinculo = !vinculo || row['Vínculo Empregatício'] === vinculo;
                const matchCargo = !cargo || row['Cargo'] === cargo;

                return matchSearch && matchTipoFolha && matchVinculo && matchCargo;
            });

            renderTable();
        }

        function renderTable() {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = '';

            document.getElementById('totalRecords').textContent = 
                `Exibindo ${filteredData.length} de ${pessoalData.length} registros`;

            filteredData.forEach((row, index) => {
                const tr = document.createElement('tr');
                tr.className = 'hover:bg-gray-50 transition';
                
                let rowHTML = `<td class="px-4 py-3 text-sm text-gray-600">${index + 1}</td>`;
                
                columns.forEach(col => {
                    const value = row[col] !== undefined ? row[col] : '-';
                    rowHTML += `<td class="px-4 py-3 text-sm text-gray-600">${value}</td>`;
                });
                
                tr.innerHTML = rowHTML;
                tbody.appendChild(tr);
            });
        }

        function exportToJSON() {
            const jsonStr = JSON.stringify(filteredData, null, 2);
            const blob = new Blob([jsonStr], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'contratados.json';
            a.click();
            URL.revokeObjectURL(url);
        }

        document.getElementById('searchInput').addEventListener('input', filterData);

        loadJSON();
    </script>
</body>
</html>
