<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>Álbum — Vanesca</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Josefin+Sans:wght@100;300;400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0b08;
      --surface: #151210;
      --gold: #c9a96e;
      --gold-light: #e8d5a3;
      --cream: #f5ede0;
      --muted: #6b5f50;
      --text: #ddd0be;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Josefin Sans', sans-serif;
      font-weight: 300;
      letter-spacing: 0.08em;
      min-height: 100vh;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 9999;
      opacity: 0.35;
    }

    /* HEADER */
    header {
      text-align: center;
      padding: 80px 24px 60px;
      position: relative;
    }

    header::after {
      content: '';
      display: block;
      width: 120px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      margin: 36px auto 0;
    }

    .header-eyebrow {
      font-size: 10px;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 18px;
    }

    h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(52px, 10vw, 96px);
      font-weight: 300;
      font-style: italic;
      color: var(--cream);
      line-height: 0.95;
      letter-spacing: -0.01em;
    }

    h1 span {
      display: block;
      font-style: normal;
      font-size: 0.38em;
      letter-spacing: 0.28em;
      color: var(--gold);
      text-transform: uppercase;
      margin-top: 14px;
      font-family: 'Josefin Sans', sans-serif;
      font-weight: 100;
    }

    .photo-count {
      margin-top: 30px;
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.25em;
    }

    /* CONTROLS */
    .controls {
      display: flex;
      justify-content: center;
      gap: 8px;
      padding: 0 24px 52px;
      flex-wrap: wrap;
    }

    .filter-btn {
      background: transparent;
      border: 1px solid var(--muted);
      color: var(--muted);
      font-family: 'Josefin Sans', sans-serif;
      font-size: 10px;
      font-weight: 300;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      padding: 8px 20px;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .filter-btn:hover, .filter-btn.active {
      border-color: var(--gold);
      color: var(--gold);
      background: rgba(201,169,110,0.06);
    }

    /* SEARCH */
    .search-wrap {
      display: flex;
      justify-content: center;
      margin-bottom: 52px;
      padding: 0 24px;
    }

    .search-wrap input {
      background: transparent;
      border: none;
      border-bottom: 1px solid var(--muted);
      color: var(--text);
      font-family: 'Josefin Sans', sans-serif;
      font-size: 12px;
      font-weight: 300;
      letter-spacing: 0.2em;
      padding: 10px 4px;
      width: 280px;
      outline: none;
      transition: border-color 0.3s;
    }

    .search-wrap input::placeholder { color: var(--muted); }
    .search-wrap input:focus { border-color: var(--gold); }

    /* GRID */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 4px;
      padding: 0 4px 120px;
      max-width: 1600px;
      margin: 0 auto;
    }

    .grid-item {
      position: relative;
      overflow: hidden;
      aspect-ratio: 1;
      cursor: pointer;
      background: var(--surface);
      opacity: 0;
      transform: translateY(20px);
      animation: fadeUp 0.6s ease forwards;
    }

    @keyframes fadeUp {
      to { opacity: 1; transform: translateY(0); }
    }

    .grid-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.6s cubic-bezier(0.25,0.46,0.45,0.94), filter 0.4s ease;
      filter: brightness(0.88) saturate(0.85);
    }

    .grid-item:hover img {
      transform: scale(1.06);
      filter: brightness(1) saturate(1.05);
    }

    .grid-item-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, transparent 50%, rgba(0,0,0,0.7) 100%);
      opacity: 0;
      transition: opacity 0.3s ease;
      display: flex;
      align-items: flex-end;
      padding: 18px;
    }

    .grid-item:hover .grid-item-overlay { opacity: 1; }

    .grid-item-num {
      font-size: 10px;
      letter-spacing: 0.25em;
      color: var(--gold-light);
    }

    .fav-btn {
      margin-left: auto;
      background: none;
      border: none;
      cursor: pointer;
      font-size: 18px;
      transition: transform 0.2s, color 0.2s;
      line-height: 1;
    }

    .fav-btn:hover { transform: scale(1.3); }

    /* LIGHTBOX */
    #lightbox {
      position: fixed;
      inset: 0;
      background: rgba(8,6,4,0.97);
      z-index: 1000;
      display: none;
      align-items: center;
      justify-content: center;
      flex-direction: column;
    }

    #lightbox.open { display: flex; }

    #lightbox-img {
      max-width: 90vw;
      max-height: 78vh;
      object-fit: contain;
      border: 1px solid rgba(201,169,110,0.15);
      box-shadow: 0 0 80px rgba(0,0,0,0.8);
      transition: opacity 0.25s ease;
    }

    #lightbox-img.fading { opacity: 0; }

    .lb-meta {
      margin-top: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }

    .lb-counter {
      font-size: 11px;
      letter-spacing: 0.3em;
      color: var(--muted);
    }

    .lb-filename {
      font-size: 9px;
      letter-spacing: 0.15em;
      color: rgba(107,95,80,0.6);
      max-width: 60vw;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .lb-nav {
      display: flex;
      gap: 16px;
      margin-top: 20px;
    }

    .lb-btn {
      background: transparent;
      border: 1px solid var(--muted);
      color: var(--muted);
      font-family: 'Josefin Sans', sans-serif;
      font-size: 11px;
      letter-spacing: 0.25em;
      padding: 10px 24px;
      cursor: pointer;
      transition: all 0.25s;
      text-transform: uppercase;
    }

    .lb-btn:hover { border-color: var(--gold); color: var(--gold); }

    #lb-close {
      position: absolute;
      top: 28px;
      right: 32px;
      background: none;
      border: none;
      color: var(--muted);
      font-size: 32px;
      cursor: pointer;
      line-height: 1;
      transition: color 0.2s;
    }

    #lb-close:hover { color: var(--gold); }

    /* Left/Right click zones */
    .lb-zone {
      position: absolute;
      top: 0;
      bottom: 0;
      width: 25%;
      cursor: pointer;
      z-index: 2;
      display: flex;
      align-items: center;
      padding: 20px;
      opacity: 0;
      transition: opacity 0.2s;
      font-size: 28px;
      color: var(--gold);
    }

    #lightbox:hover .lb-zone { opacity: 0.4; }
    .lb-zone:hover { opacity: 1 !important; background: linear-gradient(90deg, rgba(0,0,0,0.3), transparent); }
    #lb-zone-right { right: 0; justify-content: flex-end; }
    #lb-zone-right:hover { background: linear-gradient(270deg, rgba(0,0,0,0.3), transparent); }

    /* SLIDESHOW BAR */
    #slideshow-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: rgba(13,11,8,0.95);
      border-top: 1px solid rgba(201,169,110,0.12);
      padding: 14px 24px;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 20px;
      z-index: 500;
      backdrop-filter: blur(8px);
    }

    #slideshow-bar button {
      background: transparent;
      border: 1px solid var(--muted);
      color: var(--muted);
      font-family: 'Josefin Sans', sans-serif;
      font-size: 10px;
      letter-spacing: 0.25em;
      padding: 8px 18px;
      cursor: pointer;
      text-transform: uppercase;
      transition: all 0.25s;
    }

    #slideshow-bar button:hover,
    #slideshow-bar button.on {
      border-color: var(--gold);
      color: var(--gold);
    }

    .sb-sep {
      width: 1px;
      height: 22px;
      background: var(--muted);
      opacity: 0.25;
    }

    /* PROGRESS */
    #progress {
      position: fixed;
      top: 0; left: 0;
      height: 2px;
      background: linear-gradient(90deg, var(--gold), var(--gold-light));
      z-index: 9000;
      transition: width 0.3s ease;
      width: 0;
    }

    /* BOTÃO VOLTAR */
    .btn-voltar {
      position: fixed;
      top: 20px;
      left: 20px;
      background: transparent;
      border: 1px solid var(--gold);
      color: var(--gold);
      font-family: 'Josefin Sans', sans-serif;
      font-size: 11px;
      font-weight: 300;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      padding: 10px 20px;
      cursor: pointer;
      transition: all 0.3s ease;
      text-decoration: none;
      z-index: 100;
    }

    .btn-voltar:hover {
      background: var(--gold);
      color: var(--bg);
    }

    /* EMPTY */
    .empty {
      grid-column: 1/-1;
      text-align: center;
      padding: 80px;
      color: var(--muted);
      font-size: 12px;
      letter-spacing: 0.25em;
    }

    @media (max-width: 768px) {
      header { padding: 60px 20px 40px; }
      h1 { font-size: 56px; }
      h1 span { font-size: 0.32em; letter-spacing: 0.2em; }
      .controls { gap: 6px; }
      .filter-btn { padding: 8px 16px; font-size: 9px; }
      .search-wrap input { width: 100%; max-width: 300px; }
      #slideshow-bar { padding: 12px 16px; gap: 12px; flex-wrap: wrap; }
      #slideshow-bar button { padding: 8px 14px; font-size: 9px; }
      .sb-sep { display: none; }
      .lb-nav { flex-wrap: wrap; gap: 10px; }
      .lb-btn { padding: 10px 18px; font-size: 10px; }
    }

    @media (max-width: 600px) {
      .grid { grid-template-columns: repeat(2, 1fr); gap: 3px; }
      h1 { font-size: 42px; }
      h1 span { font-size: 0.28em; }
      .lb-zone { display: none; }
      header { padding: 50px 15px 30px; }
      .header-eyebrow { font-size: 9px; }
      .photo-count { font-size: 10px; }
      #lightbox-img { max-width: 95vw; max-height: 70vh; }
      .lb-counter { font-size: 10px; }
      .lb-nav { width: 100%; justify-content: center; }
      .lb-btn { flex: 1; min-width: 80px; text-align: center; }
    }

    @media (max-width: 400px) {
      .grid { grid-template-columns: repeat(2, 1fr); gap: 2px; }
      h1 { font-size: 36px; }
      .controls { padding: 0 15px 40px; }
      .filter-btn { padding: 6px 12px; }
      #slideshow-bar { padding: 10px 12px; }
      #slideshow-bar button { padding: 6px 10px; font-size: 8px; }
    }
  </style>
</head>
<body>

<div id="progress"></div>

<a href="portal.html" class="btn-voltar">← Voltar</a>

<header>
  <p class="header-eyebrow">Galeria Pessoal</p>
  <h1>Vanesca<span>Álbum de Memórias</span></h1>
  <p class="photo-count" id="count-display">57 fotografias</p>
</header>

<div class="controls">
  <button class="filter-btn active" data-filter="all">Todas</button>
  <button class="filter-btn" data-filter="favorites">Favoritas ♥</button>
</div>

<div class="search-wrap">
  <input type="text" id="search" placeholder="Buscar por número da foto..." autocomplete="off" />
</div>

<div class="grid" id="gallery"></div>

<!-- LIGHTBOX -->
<div id="lightbox">
  <button id="lb-close" title="Fechar (Esc)">×</button>
  <div class="lb-zone" id="lb-zone-left">‹</div>
  <div class="lb-zone" id="lb-zone-right">›</div>
  <img id="lightbox-img" src="" alt="" />
  <div class="lb-meta">
    <p class="lb-counter" id="lb-counter"></p>
    <p class="lb-filename" id="lb-filename"></p>
  </div>
  <div class="lb-nav">
    <button class="lb-btn" id="lb-prev">← Anterior</button>
    <button class="lb-btn" id="lb-fav">♡ Favoritar</button>
    <button class="lb-btn" id="lb-next">Próxima →</button>
  </div>
</div>

<!-- BOTTOM BAR -->
<div id="slideshow-bar">
  <button id="btn-slideshow">▶ Slideshow</button>
  <div class="sb-sep"></div>
  <button id="btn-shuffle">Embaralhar</button>
  <div class="sb-sep"></div>
  <button id="btn-download">⬇ Baixar foto</button>
  <div class="sb-sep"></div>
  <span style="font-size:10px;letter-spacing:0.2em;color:var(--muted)" id="fav-count"></span>
</div>

<script>

  const BASE = 'fotos/';

  const photoFiles = [

    "658533466_18350940127230192_3284685320773143627_n.jpg",
    "658850618_18518996038072401_8664531027693418212_n.jpg"
  ];

  // photo objects with original index
  let photos = photoFiles.map((file, i) => ({ file, src: BASE + file, index: i }));

  let favorites = JSON.parse(localStorage.getItem('vanesca_favs') || '[]');
  let currentFilter = 'all';
  let currentSearch = '';
  let filteredPhotos = [];
  let lbIndex = 0;
  let slideshowTimer = null;

  function getFiltered() {
    let list = [...photos];
    if (currentFilter === 'favorites') {
      list = list.filter(p => favorites.includes(p.index));
    }
    if (currentSearch.trim()) {
      const q = currentSearch.trim();
      list = list.filter(p => String(p.index + 1).includes(q));
    }
    return list;
  }

  function updateFavCount() {
    const el = document.getElementById('fav-count');
    el.textContent = favorites.length ? `${favorites.length} favorita${favorites.length !== 1 ? 's' : ''}` : '';
  }

  function renderGrid() {
    const gallery = document.getElementById('gallery');
    gallery.innerHTML = '';
    filteredPhotos = getFiltered();

    document.getElementById('count-display').textContent =
      `${filteredPhotos.length} fotografia${filteredPhotos.length !== 1 ? 's' : ''}`;
    updateFavCount();

    if (!filteredPhotos.length) {
      gallery.innerHTML = '<p class="empty">Nenhuma foto encontrada.</p>';
      return;
    }

    filteredPhotos.forEach(({ file, src, index }, i) => {
      const item = document.createElement('div');
      item.className = 'grid-item';
      item.style.animationDelay = `${Math.min(i * 0.035, 1.5)}s`;

      const isFav = favorites.includes(index);

      item.innerHTML = `
        <img src="${src}" alt="Foto ${index + 1}" loading="lazy" />
        <div class="grid-item-overlay">
          <span class="grid-item-num">${String(index + 1).padStart(2, '0')} / ${photos.length}</span>
          <button class="fav-btn" data-idx="${index}"
            style="color:${isFav ? '#c9a96e' : 'rgba(255,255,255,0.35)'}"
            title="${isFav ? 'Remover favorito' : 'Favoritar'}">
            ${isFav ? '♥' : '♡'}
          </button>
        </div>`;

      item.querySelector('.fav-btn').addEventListener('click', e => {
        e.stopPropagation();
        toggleFav(index);
      });

      item.addEventListener('click', () => openLightbox(i));
      gallery.appendChild(item);
    });
  }

  function toggleFav(index) {
    const pos = favorites.indexOf(index);
    if (pos > -1) favorites.splice(pos, 1);
    else favorites.push(index);
    localStorage.setItem('vanesca_favs', JSON.stringify(favorites));
    renderGrid();
    if (document.getElementById('lightbox').classList.contains('open')) updateLbFavBtn();
  }

  // ─── LIGHTBOX ─────────────────────────────────────────────────────
  function openLightbox(filteredIdx) {
    lbIndex = filteredIdx;
    showLbPhoto();
    document.getElementById('lightbox').classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  function closeLightbox() {
    document.getElementById('lightbox').classList.remove('open');
    document.body.style.overflow = '';
    stopSlideshow();
  }

  function showLbPhoto() {
    const img = document.getElementById('lightbox-img');
    img.classList.add('fading');
    setTimeout(() => {
      const p = filteredPhotos[lbIndex];
      img.src = p.src;
      img.alt = `Foto ${p.index + 1}`;
      document.getElementById('lb-counter').textContent =
        `${lbIndex + 1} de ${filteredPhotos.length}`;
      document.getElementById('lb-filename').textContent = p.file;
      img.classList.remove('fading');
      updateLbFavBtn();
      updateProgress();
    }, 180);
  }

  function updateLbFavBtn() {
    const p = filteredPhotos[lbIndex];
    const btn = document.getElementById('lb-fav');
    const isFav = favorites.includes(p.index);
    btn.textContent = isFav ? '♥ Favorita' : '♡ Favoritar';
    btn.style.color = isFav ? 'var(--gold)' : '';
    btn.style.borderColor = isFav ? 'var(--gold)' : '';
  }

  function lbPrev() {
    lbIndex = (lbIndex - 1 + filteredPhotos.length) % filteredPhotos.length;
    showLbPhoto();
  }

  function lbNext() {
    lbIndex = (lbIndex + 1) % filteredPhotos.length;
    showLbPhoto();
  }

  function updateProgress() {
    const pct = filteredPhotos.length > 1
      ? (lbIndex / (filteredPhotos.length - 1)) * 100 : 100;
    document.getElementById('progress').style.width = pct + '%';
  }

  // ─── SLIDESHOW ────────────────────────────────────────────────────
  function startSlideshow() {
    if (!document.getElementById('lightbox').classList.contains('open')) {
      lbIndex = 0;
      openLightbox(0);
    }
    slideshowTimer = setInterval(lbNext, 3500);
    document.getElementById('btn-slideshow').classList.add('on');
    document.getElementById('btn-slideshow').textContent = '⏸ Pausar';
  }

  function stopSlideshow() {
    clearInterval(slideshowTimer);
    slideshowTimer = null;
    document.getElementById('btn-slideshow').classList.remove('on');
    document.getElementById('btn-slideshow').textContent = '▶ Slideshow';
  }

  // ─── EVENTS ───────────────────────────────────────────────────────
  document.getElementById('lb-close').addEventListener('click', closeLightbox);
  document.getElementById('lb-prev').addEventListener('click', lbPrev);
  document.getElementById('lb-next').addEventListener('click', lbNext);
  document.getElementById('lb-zone-left').addEventListener('click', lbPrev);
  document.getElementById('lb-zone-right').addEventListener('click', lbNext);

  document.getElementById('lb-fav').addEventListener('click', () => {
    toggleFav(filteredPhotos[lbIndex].index);
  });

  document.getElementById('lightbox').addEventListener('click', e => {
    if (e.target === document.getElementById('lightbox') ||
        e.target === document.getElementById('lightbox-img')) return;
  });

  document.addEventListener('keydown', e => {
    const lb = document.getElementById('lightbox');
    if (lb.classList.contains('open')) {
      if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); lbNext(); }
      else if (e.key === 'ArrowLeft') lbPrev();
      else if (e.key === 'Escape') closeLightbox();
      else if (e.key === 'f' || e.key === 'F') toggleFav(filteredPhotos[lbIndex].index);
    }
  });

  document.getElementById('btn-slideshow').addEventListener('click', () => {
    slideshowTimer ? stopSlideshow() : startSlideshow();
  });

  document.getElementById('btn-shuffle').addEventListener('click', () => {
    photos = photos.sort(() => Math.random() - 0.5);
    renderGrid();
  });

  document.getElementById('btn-download').addEventListener('click', () => {
    const lb = document.getElementById('lightbox');
    if (!lb.classList.contains('open')) return;
    const p = filteredPhotos[lbIndex];
    const a = document.createElement('a');
    a.href = p.src;
    a.download = p.file;
    a.click();
  });

  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentFilter = btn.dataset.filter;
      renderGrid();
    });
  });

  document.getElementById('search').addEventListener('input', e => {
    currentSearch = e.target.value;
    renderGrid();
  });

  // Touch swipe on lightbox
  let touchStartX = null;
  document.getElementById('lightbox').addEventListener('touchstart', e => {
    touchStartX = e.touches[0].clientX;
  });
  document.getElementById('lightbox').addEventListener('touchend', e => {
    if (touchStartX === null) return;
    const dx = e.changedTouches[0].clientX - touchStartX;
    if (Math.abs(dx) > 50) { dx < 0 ? lbNext() : lbPrev(); }
    touchStartX = null;
  });

  // Init
  renderGrid();
</script>
</body>
</html>
